name: Release

on:
  release:
    types: [published]

jobs:
  update-major-tag:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match required format vX.Y.Z"
            exit 1
          fi
          MAJOR="${TAG%%.*}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
        id: version

      - name: Move major version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa ${{ steps.version.outputs.major }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin ${{ steps.version.outputs.major }} --force
