name: Test Action

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test SQL Audit Action
        uses: ./  # References the action in the current repo
        with:
          backend-url: ${{ vars.SO_CODE_REVIEW_URL }}
          api-key: ${{ secrets.SO_CODE_REVIEW_API_KEY }}
