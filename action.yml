name: 'Code Review'
description: 'AI-powered code review by Single Origin'
author: 'Single Origin'

branding:
  icon: 'code'
  color: 'blue'

inputs:
  backend-url:
    description: 'Backend API base URL'
    required: true
  api-key:
    description: 'API key (base64-encoded id:secret)'
    required: true
  github-token:
    description: 'GitHub token for API calls'
    required: false
    default: ${{ github.token }}
  timeout-seconds:
    description: 'Backend request timeout in seconds'
    required: false
    default: '300'
  upload-artifact:
    description: 'Upload raw result as artifact for debugging'
    required: false
    default: 'false'

outputs:
  artifact-path:
    description:
      'Path to the raw result JSON file (when upload-artifact is true)'

runs:
  using: 'node24'
  main: 'dist/index.js'
