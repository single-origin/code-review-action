name: 'Code Review'
description: 'SQL audit and conversational agent review'
author: 'Single Origin'

branding:
  icon: 'database'
  color: 'blue'

inputs:
  # ========== Audit Mode Parameters (backward compatible) ==========
  backend-url:
    description: 'Backend API URL (for audit mode)'
    required: false
  api-key:
    description: 'API key for audit mode (Basic Auth)'
    required: false

  # ========== Agent Mode Parameters ==========
  agent-api-url:
    description: 'Agent API URL (for agent mode)'
    required: false
  agent-api-key:
    description: 'API key for agent mode'
    required: false

  # ========== Common Parameters ==========
  upload-artifact:
    description: 'Whether to upload raw result as artifact (audit mode only)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for posting comments'
    required: false
    default: ${{ github.token }}

outputs:
  sqls-processed:
    description: 'Number of sql(s) processed'
    value: ${{ steps.audit.outputs.sqls-processed }}

runs:
  using: 'composite'
  steps:
    # ===== Mode Detection =====
    - name: Detect mode
      id: mode
      shell: bash
      run: |
        HAS_AUDIT="false"
        HAS_AGENT="false"

        if [ -n "${{ inputs.backend-url }}" ] && [ -n "${{ inputs.api-key }}" ]; then
          HAS_AUDIT="true"
        fi

        if [ -n "${{ inputs.agent-api-url }}" ]; then
          HAS_AGENT="true"
        fi

        # Validate: cannot have both or neither
        if [ "$HAS_AUDIT" == "true" ] && [ "$HAS_AGENT" == "true" ]; then
          echo "::error::Cannot specify both audit (backend-url + api-key) and agent (agent-api-url) configurations"
          exit 1
        fi

        if [ "$HAS_AUDIT" == "false" ] && [ "$HAS_AGENT" == "false" ]; then
          echo "::error::Must specify either backend-url + api-key (audit mode) OR agent-api-url (agent mode)"
          exit 1
        fi

        # Set outputs for subsequent steps
        echo "is_audit=$HAS_AUDIT" >> $GITHUB_OUTPUT
        echo "is_agent=$HAS_AGENT" >> $GITHUB_OUTPUT

        if [ "$HAS_AUDIT" == "true" ]; then
          echo "::notice::Running in Audit mode"
        else
          echo "::notice::Running in Agent mode"
        fi

    # ===== Audit Mode Steps =====
    - name: Check if PR event (Audit)
      if: steps.mode.outputs.is_audit == 'true'
      shell: bash
      run: |
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "⚠️ Audit mode is designed for pull_request events only, exiting"
          echo "Current event: ${{ github.event_name }}"
          exit 9
        fi

    - name: Checkout code (Audit)
      if: steps.mode.outputs.is_audit == 'true'
      uses: actions/checkout@v4

    - name: Get changed SQL files via GitHub API (Audit)
      id: changed-files
      if: steps.mode.outputs.is_audit == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });

          const sqlFiles = files.filter(f =>
            f.filename.endsWith('.sql') &&
            f.status !== 'removed'
          );
          if (sqlFiles.length === 0) {
            core.setOutput('count', '0');
            console.log('No SQL files changed');
            return;
          }

          core.setOutput('count', sqlFiles.length.toString());

          // Save file list
          const fs = require('fs');
          fs.writeFileSync('/tmp/sql_files.txt',
            sqlFiles.map(f => f.filename).join('\n') + '\n'
          );

          console.log(`Found ${sqlFiles.length} SQL file(s)`);

    - name: Audit SQL files
      id: audit
      if: steps.mode.outputs.is_audit == 'true' && steps.changed-files.outputs.count != '0'
      shell: bash
      run: |
        echo '{"results": []}' > /tmp/audit_result.json

        while IFS= read -r file; do
          echo "Auditing: $file"
          if [ ! -f "$file" ]; then
            echo "$file not found, skipping"
            continue
          fi

          content=$(cat "$file" | jq -Rs .)

          payload=$(jq -n \
            --arg query_engine "STORAGE_TYPE_SNOWFLAKE" \
            --argjson content "$content" \
            '{storageType: $query_engine, sql: $content}')

          url="${{ inputs.backend-url }}/api/v1/query/audit/sql"
          echo "Invoking API with url $url"

          start=$(date +%s)
          response=$(curl -s -w "\n%{http_code}" -X POST "$url" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${{ inputs.api-key }}" \
            -d "$payload")
          end=$(date +%s)
          echo "API duration: $(( end - start )) seconds"

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" != "200" ]; then
            echo "Error auditing $file: Backend returned status $http_code"
            echo "$body"

            existing=$(cat /tmp/audit_result.json)
            merged=$(echo "$existing" | jq \
              --arg file "$file" \
              --arg status "$http_code" \
              '.results += [{"file": $file, "status": $status}]')
            echo "$merged" > /tmp/audit_result.json
            continue
          fi

          echo "Invoked API successfully with hostname ${{ inputs.backend-url }}, processing result"

          audit_data=$(echo "$body" | jq '.data')

          existing=$(cat /tmp/audit_result.json)

          merged=$(echo "$existing" | jq \
            --arg file "$file" \
            --arg status "$http_code" \
            --argjson audit "$audit_data" \
            '.results += [{"file": $file, "status": $status, "audit": $audit}]')
          echo "$merged" > /tmp/audit_result.json

        done < /tmp/sql_files.txt

        sqls_processed=$(cat /tmp/audit_result.json | jq '.results | length' )

        echo "sqls-processed=$sqls_processed" >> $GITHUB_OUTPUT
        echo "Audit complete"

    - name: Post comments on PR (Audit)
      if: steps.mode.outputs.is_audit == 'true' && steps.changed-files.outputs.count != '0'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const saved_result = JSON.parse(fs.readFileSync('/tmp/audit_result.json', 'utf8'));

          const audit_results = [];

          for (const result of saved_result.results) {
            audit_results.push(result);
          }

          if (audit_results.length === 0) {
            console.log('No sql processed');
            return
          }

          let comment = '## 🔍 Single Origin SQL Audit Results\n\n';
          comment += `**Files Audited:** ${audit_results.length}\n\n`;
          comment += '### Audit Reports\n\n';

          audit_results.forEach(result => {
            const isSuccess = result.status === '200';

            if (!isSuccess) {
              comment += `⛔ **${result.file} audit failed**\n\n`;
              return;
            }
            comment += '<details>\n';
            comment += `<summary><strong><ins>${result.file}</ins></strong></summary>\n\n`;

            const audit = result.audit;
            if (!audit.aiReport || !audit.aiReport.isEnabled) {
              comment += '#### 🔒 AI analysis not enabled for your deployment\n';
            } else {
              comment += '#### Overview\n';
              comment += `${audit.aiReport.overview}\n`;

              comment += '#### Recommendations\n';
              audit.aiReport.recommendations.forEach(rec => {
                comment += `- ${rec}\n`;
              })

              comment += '<details>\n';
              comment += '<summary><strong>Suggested SQL</strong></summary>\n\n';
              comment += '```sql\n';
              comment += audit.aiReport.suggestedSql
              comment += '\n```\n\n';
              comment += '</details>\n\n';
            }

            comment += '#### Table Scan Report\n';
            comment += '| Table | Cluster key used? | Time-based filter used? |\n';
            comment += '| --- | --- | --- |\n';

            audit.tableScanReports.forEach(scan => {
              comment += `| ${scan.tableFqn} | ${scan.clusterKeyUsage.isUsed? '✅':'❌'} | ${scan.timeBasedColumnUsage.isUsed? '✅':'❌'} |\n`;
            })

            comment += '</details>\n\n';
          });

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
          });

    - name: Upload results (Audit)
      if: steps.mode.outputs.is_audit == 'true' && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: audit-results
        path: /tmp/audit_result.json
        if-no-files-found: warn

    # ===== Agent Mode Steps =====
    - name: Checkout code (Agent)
      if: steps.mode.outputs.is_agent == 'true'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get PR info (Agent)
      id: pr
      if: steps.mode.outputs.is_agent == 'true'
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
        else
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
        fi

    - name: Review SQL files (Agent mode)
      if: steps.mode.outputs.is_agent == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        AGENT_API_URL: ${{ inputs.agent-api-url }}
        AGENT_API_KEY: ${{ inputs.agent-api-key }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { execSync } = require('child_process');

          // Get changed files in PR
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number
          });

          // Filter SQL files
          const sqlFiles = files.filter(f =>
            f.filename.endsWith('.sql') ||
            f.filename.includes('/queries/') ||
            f.filename.includes('/sql/')
          );

          if (sqlFiles.length === 0) {
            console.log('No SQL files changed in this PR');
            return;
          }

          console.log(`Found ${sqlFiles.length} SQL file(s) to review`);

          const repoName = context.repo.owner + '-' + context.repo.repo;
          const prNumber = context.payload.pull_request.number;
          const headSha = context.payload.pull_request.head.sha;

          // Build headers
          const headers = {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          };
          if (process.env.AGENT_API_KEY) {
            headers['Authorization'] = `Bearer ${process.env.AGENT_API_KEY}`;
          }

          for (const file of sqlFiles) {
            if (file.status === 'removed') {
              console.log(`Skipping removed file: ${file.filename}`);
              continue;
            }

            console.log(`Analyzing: ${file.filename}`);

            // Get file content
            let sqlContent = '';
            try {
              sqlContent = execSync(`git show HEAD:${file.filename}`, { encoding: 'utf8' });
            } catch (e) {
              console.log(`Could not read file: ${e.message}`);
              continue;
            }

            // Build conversation ID per file
            const conversationId = `pr-${repoName}-${prNumber}-${file.filename}`;

            // Call Agent API
            const message = `Review: ${file.filename}

          \`\`\`sql
          ${sqlContent}
          \`\`\``;

            try {
              const response = await fetch(`${process.env.AGENT_API_URL}/api/agent/chat`, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                  conversationId: conversationId,
                  message: message
                })
              });

              if (!response.ok) {
                const errText = await response.text();
                console.log(`API error for ${file.filename}: ${response.status} - ${errText}`);
                continue;
              }

              const data = await response.json();
              const agentResponse = data.response;

              if (agentResponse && !agentResponse.startsWith('Error')) {
                // Parse patch to find the actual line number in the new file
                let targetLine = 1;
                if (file.patch) {
                  // Extract line number from @@ -0,0 +1 @@ or @@ -1,5 +1,10 @@
                  const match = file.patch.match(/@@ -\d+,?\d* \+(\d+)/);
                  if (match) {
                    targetLine = parseInt(match[1], 10);
                  }
                }

                // Create inline comment using line + side (not position)
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    commit_id: headSha,
                    path: file.filename,
                    line: targetLine,
                    side: 'RIGHT',
                    body: `🤖 **SQL Review**\n\n${agentResponse}\n\n---\n*Reply in this thread to ask follow-up questions.*`
                  });
                  console.log(`Posted inline comment for ${file.filename} at line ${targetLine}`);
                } catch (commentErr) {
                  console.log(`Inline comment failed: ${commentErr.message}`);
                  // Fallback to PR comment
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: `### 🤖 SQL Review: \`${file.filename}\`\n\n${agentResponse}\n\n---\n*Reply in this thread to ask follow-up questions.*`
                  });
                  console.log(`Posted fallback PR comment for ${file.filename}`);
                }
              }
            } catch (e) {
              console.log(`Error calling Agent API for ${file.filename}: ${e.message}`);
            }
          }

    - name: Reply to review comment (Agent mode)
      if: steps.mode.outputs.is_agent == 'true' && github.event_name == 'pull_request_review_comment'
      uses: actions/github-script@v7
      env:
        AGENT_API_URL: ${{ inputs.agent-api-url }}
        AGENT_API_KEY: ${{ inputs.agent-api-key }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const comment = context.payload.comment;
          const prNumber = context.payload.pull_request.number;
          const repoName = context.repo.owner + '-' + context.repo.repo;

          // Skip Bot comments to avoid infinite loops
          if (comment.user.type === 'Bot') {
            console.log('Skipping Bot comment');
            return;
          }

          // Check for mentions of other users (excluding @sql-agent)
          const mentionRegex = /@(\w+)/g;
          const mentions = [...comment.body.matchAll(mentionRegex)]
            .map(m => m[1])
            .filter(m => m.toLowerCase() !== 'sql-agent');

          const mentionsSqlAgent = comment.body.toLowerCase().includes('@sql-agent');

          // Trace back to root comment and check if it's from Agent
          let isInAgentThread = false;
          let hasHandoff = false;
          let rootComment = null;

          if (comment.in_reply_to_id) {
            try {
              // Traverse up the chain to find the root comment
              let currentCommentId = comment.in_reply_to_id;
              while (currentCommentId) {
                const { data: c } = await github.rest.pulls.getReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: currentCommentId
                });
                rootComment = c;
                if (!c.in_reply_to_id) {
                  break;  // Found the root
                }
                currentCommentId = c.in_reply_to_id;
              }

              // Check if root comment is from Agent (Bot type or contains Agent signature)
              if (rootComment) {
                isInAgentThread = rootComment.user.type === 'Bot' ||
                                  rootComment.body.includes('🤖 **SQL Review**');
                console.log(`Root comment ID: ${rootComment.id}, user type: ${rootComment.user.type}, isInAgentThread: ${isInAgentThread}`);
              }

              // Check if there's already a handoff in this thread
              if (isInAgentThread && rootComment) {
                // Wait a bit to avoid race condition with concurrent Actions
                // (another Action might be posting a handoff message right now)
                await new Promise(resolve => setTimeout(resolve, 3000));

                const { data: allComments } = await github.rest.pulls.listReviewComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });

                // Collect all comments in the thread chain (including deep replies)
                const handoffThreadIds = new Set([rootComment.id]);
                let foundNewHandoff = true;
                while (foundNewHandoff) {
                  foundNewHandoff = false;
                  for (const c of allComments) {
                    if (!handoffThreadIds.has(c.id) && handoffThreadIds.has(c.in_reply_to_id)) {
                      handoffThreadIds.add(c.id);
                      foundNewHandoff = true;
                    }
                  }
                }
                const threadComments = allComments.filter(c => handoffThreadIds.has(c.id));

                // Check if any Bot comment contains handoff message
                hasHandoff = threadComments.some(c =>
                  c.user.type === 'Bot' &&
                  c.body.includes('Stepping back and letting humans take over')
                );
                console.log(`Thread has handoff: ${hasHandoff}`);
              }
            } catch (e) {
              console.log(`Could not fetch comments: ${e.message}`);
            }
          }

          // Decision logic:
          // 1. Not in Agent thread -> ignore (even if @sql-agent)
          // 2. In Agent thread + handoff + no @sql-agent -> ignore
          // 3. In Agent thread + @ other people (without @sql-agent) -> handoff and stop
          // 4. In Agent thread (normal reply or @sql-agent to re-engage) -> reply

          // Rule 1: Only respond in threads started by Agent
          if (!isInAgentThread) {
            console.log('Not in Agent thread, skipping (Agent only responds in its own threads)');
            return;
          }

          // Rule 2: Thread had handoff, humans took over, ignore unless re-engaged with @sql-agent
          if (hasHandoff && !mentionsSqlAgent) {
            console.log('Thread has handoff and no @sql-agent, skipping');
            return;
          }

          // Rule 3: Handoff when @ other people (without also @sql-agent)
          if (mentions.length > 0 && !mentionsSqlAgent) {
            console.log(`Detected mentions of other users: ${mentions.join(', ')}`);
            await github.rest.pulls.createReplyForReviewComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              comment_id: comment.id,
              body: `🤖 Detected human involvement (@${mentions.join(', @')}). Stepping back and letting humans take over.\n\n*Reply with @sql-agent to re-engage.*`
            });
            return;
          }

          // Rule 4: In Agent thread, proceed with reply

          // Fetch all comments in this thread to build conversation history
          let threadHistory = [];
          if (rootComment) {
            const { execSync } = require('child_process');

            // First, add the original SQL file as the first user message
            // (the initial review request is not part of the GitHub thread)
            let originalSqlContent = '';
            try {
              originalSqlContent = execSync(`git show HEAD:${comment.path}`, { encoding: 'utf8' });
              console.log(`Read original SQL file: ${comment.path}`);
            } catch (e) {
              console.log(`Could not read original file: ${e.message}`);
            }

            if (originalSqlContent) {
              threadHistory.push({
                role: 'user',
                content: `Review: ${comment.path}\n\n\`\`\`sql\n${originalSqlContent}\n\`\`\``
              });
            }

            // Then fetch and add thread comments
            const { data: allThreadComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Collect all comments in the thread chain (including deep replies)
            // GitHub review comments form a chain: Root -> Reply1 -> Reply2 -> Reply3
            // We need to collect all comments in the chain, not just direct replies to root
            const threadIds = new Set([rootComment.id]);
            let foundNew = true;
            while (foundNew) {
              foundNew = false;
              for (const c of allThreadComments) {
                if (!threadIds.has(c.id) && threadIds.has(c.in_reply_to_id)) {
                  threadIds.add(c.id);
                  foundNew = true;
                }
              }
            }
            const threadComments = allThreadComments
              .filter(c => threadIds.has(c.id))
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            console.log(`Found ${threadComments.length} comments in thread chain (IDs: ${[...threadIds].join(', ')})`);

            // Convert to messages format for API
            // Note: Don't include the current comment as it will be sent as the new message
            // Strip 🤖 prefix from bot messages to prevent LLM from duplicating the emoji
            const threadMessages = threadComments
              .filter(c => c.id !== comment.id)
              .map(c => ({
                role: c.user.type === 'Bot' ? 'assistant' : 'user',
                content: c.user.type === 'Bot'
                  ? c.body.replace(/^🤖\s*/g, '').trim()
                  : c.body
              }));

            threadHistory = threadHistory.concat(threadMessages);
            console.log(`Built conversation history with ${threadHistory.length} messages (including original SQL)`);
          }

          // Proceed with reply
          const userMessage = comment.body.replace(/@sql-agent/gi, '').trim();
          const conversationId = `pr-${repoName}-${prNumber}-${comment.path}`;

          console.log(`Processing reply for conversation: ${conversationId}`);
          console.log(`User message: ${userMessage}`);

          // Build headers
          const headers = {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          };
          if (process.env.AGENT_API_KEY) {
            headers['Authorization'] = `Bearer ${process.env.AGENT_API_KEY}`;
          }

          try {
            const response = await fetch(`${process.env.AGENT_API_URL}/api/agent/chat`, {
              method: 'POST',
              headers: headers,
              body: JSON.stringify({
                conversationId: conversationId,
                message: userMessage,
                messages: threadHistory  // Pass conversation history from GitHub thread
              })
            });

            if (!response.ok) {
              console.log(`API error: ${response.status}`);
              return;
            }

            const data = await response.json();
            const agentResponse = data.response;

            if (agentResponse && !agentResponse.startsWith('Error')) {
              // Reply to the review comment thread
              // Add 🤖 prefix for consistency (used to identify Agent messages in thread)
              const formattedResponse = agentResponse.startsWith('🤖')
                ? agentResponse
                : `🤖 ${agentResponse}`;
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                comment_id: comment.id,
                body: formattedResponse
              });
              console.log('Reply posted successfully');
            }
          } catch (e) {
            console.log(`Error: ${e.message}`);
          }
